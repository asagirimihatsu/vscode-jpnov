name: Integrated Tests

on:
  push:
    branches: ['**']
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    name: Integration suites + E2E smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Integration suites (vscode-mock client + fs-fixture server)
        run: npm run test:integration
      - name: E2E smoke (bundled server over stdio + headless Chrome)
        run: npm run test:e2e
        env:
          JPNOV_E2E_REQUIRE_BROWSER: '1'

  package:
    name: Package VSIX
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: vsce package (runs type-check + lint + production build)
        run: npm run package
      - uses: actions/upload-artifact@v4
        with:
          name: jpnov-vsix
          path: '*.vsix'
          if-no-files-found: error
