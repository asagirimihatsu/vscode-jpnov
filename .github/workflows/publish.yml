name: Publish

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish

jobs:
  publish:
    name: Test, package, publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Resolve version, guard collisions
        id: meta
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "$GITHUB_REF_NAME" != "main" ]; then
            echo "publish must be dispatched from main (got $GITHUB_REF_NAME)"; exit 1
          fi
          VERSION="$(node -p 'require("./package.json").version')"
          TAG="v$VERSION"
          if git ls-remote --exit-code origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "tag $TAG already exists — bump the version in package.json first"; exit 1
          fi
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "release $TAG already exists — bump the version in package.json first"; exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
      - name: Unit tests
        run: npm test
      - name: Integration suites
        run: npm run test:integration
      - name: E2E smoke
        run: npm run test:e2e
        env:
          JPNOV_E2E_REQUIRE_BROWSER: '1'
      - name: Package
        run: npm run package
      - name: Publish to Visual Studio Marketplace
        run: npx vsce publish --packagePath "jpnov-${{ steps.meta.outputs.version }}.vsix"
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
      - name: Release with the VSIX attached
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ steps.meta.outputs.tag }}" "jpnov-${{ steps.meta.outputs.version }}.vsix" --target "$GITHUB_SHA" --title "${{ steps.meta.outputs.tag }}" --generate-notes
